server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 100000000
    block_retention: 1h
    compacted_block_retention: 1h

storage:
  trace:
    backend: local                     
    wal:
      path: /tmp/tempo/wal             
    local:
      path: /tmp/tempo/blocks
